services:
  php:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www
    networks:
      - app-network
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - php

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: yoyaku
      POSTGRES_USER: yoyaku
      POSTGRES_PASSWORD: yoyaku
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - app-network

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      # node_modules はコンテナ内に独立して持つ（Mac と Linux でバイナリが異なるため）
      - frontend-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
      - API_URL=http://nginx/api
    networks:
      - app-network

volumes:
  postgres-data:
  frontend-node-modules:

networks:
  app-network:
    driver: bridge
